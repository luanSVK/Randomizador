<!DOCTYPE html> 
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sorteador Marvel Rivals - Aleatório Total</title>
  
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.0/dist/confetti.browser.min.js"></script>

  <style>
    /* ===== ESTILOS GERAIS ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      min-height: 100vh;
      background: url('https://i.pinimg.com/736x/5f/33/fc/5f33fc9544e4ea854ded0353dd59aad8.jpg') center/cover no-repeat fixed;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.75); z-index: -1;
    }

    .container { max-width: 1000px; width: 100%; margin-top: 20px; }

    h1 {
      font-size: 2.5em; margin-bottom: 20px; color: #ffd700;
      text-shadow: 2px 2px 4px #000; text-transform: uppercase;
    }

    /* ===== ÁREA DE INPUT ===== */
    .input-box {
      background: rgba(255, 255, 255, 0.1);
      padding: 25px;
      border-radius: 15px;
      border: 1px solid #ff3d00;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    label { display: block; margin-bottom: 10px; font-size: 1.1em; color: #fff; font-weight: bold; }

    textarea {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 2px solid #555;
      background: #fff;
      color: #333;
      text-align: center;
      resize: vertical;
      min-height: 60px;
    }

    textarea:focus { outline: none; border-color: #ff3d00; }

    .dica-enter {
      margin-top: 10px;
      font-size: 0.9em;
      color: #ccc;
      opacity: 0.8;
    }

    /* ===== BOTÃO ===== */
    button#btn-sortear {
      margin-top: 15px;
      font-size: 18px; padding: 12px 40px; cursor: pointer;
      background: #ff3d00; border: none; border-radius: 8px;
      color: white; font-weight: bold; text-transform: uppercase;
      transition: transform 0.2s, background 0.2s;
      box-shadow: 0 4px 10px rgba(255, 61, 0, 0.4);
    }

    button#btn-sortear:hover:not(:disabled) { background: #ff6e40; transform: scale(1.05); }
    button:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }

    /* ===== RESULTADO (GRID) ===== */
    #resultado {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-top: 30px;
      min-height: 200px;
    }

    .card {
      background: linear-gradient(180deg, #1a1a1a 0%, #2d2d2d 100%);
      border: 2px solid #ff3d00;
      border-radius: 12px;
      width: 180px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: zoomIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; /* Forwards mantém o estado final */
      box-shadow: 0 8px 20px rgba(0,0,0,0.7);
      position: relative;
      opacity: 0; /* Começa invisível para a animação */
    }

    .card h3 {
      font-size: 16px; color: #000; background: #fff;
      width: 100%; padding: 6px; border-radius: 20px;
      margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      font-weight: 800; text-transform: uppercase;
      box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .card img {
      width: 100%; height: 140px; object-fit: cover;
      border-radius: 8px; border: 2px solid #555;
      background-color: #000;
      opacity: 1 !important;
    }

    .card p {
      margin-top: 10px; font-weight: bold; color: #ffd700; font-size: 15px;
      text-shadow: 1px 1px 2px #000;
    }

    @keyframes zoomIn { 
      from { transform: scale(0) translateY(50px); opacity: 0; } 
      to { transform: scale(1) translateY(0); opacity: 1; } 
    }

    .mensagem-erro { color: #ff6b6b; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>

      <button id="btn-sortear">🎲 Sortear Tudo</button>

      { nome: "Rocket", img: "https://i.pinimg.com/736x/1d/c6/42/1dc642c6a85add8ec19c4503657faaa0.jpg" },

]


    // ===== ELEMENTOS DO DOM =====
    const btnSortear = document.getElementById("btn-sortear");
    const inputNomes = document.getElementById("input-nomes");
    const divResultado = document.getElementById("resultado");

    // ===== FUNÇÃO EMBARALHAR =====
    function embaralhar(array) {
      let novoArray = [...array];
      for (let i = novoArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [novoArray[i], novoArray[j]] = [novoArray[j], novoArray[i]];
      }
      return novoArray;
    }

    // ===== LÓGICA DO SORTEIO =====
    function realizarSorteio() {
      const texto = inputNomes.value;
      
      // Limpeza dos nomes
      let listaNomes = texto.split(',')
        .map(nome => nome.trim())
        .filter(nome => nome !== "");

      // Validação
      if (listaNomes.length === 0) {
        alert("Por favor, digite os nomes dos jogadores.");
        return;
      }
      if (listaNomes.length > personagensOriginais.length) {
        alert(`Muitas pessoas! Temos apenas ${personagensOriginais.length} personagens disponíveis.`);
        return;
      }

      // Preparação Visual
      btnSortear.disabled = true;
      divResultado.innerHTML = '<h2 style="color: #ffd700; width: 100%;">🎲 Misturando nomes e heróis...</h2>';

      setTimeout(() => {
        try {
          // EMBARALHAMENTO DUPLO (Nomes e Personagens)
          const nomesEmbaralhados = embaralhar(listaNomes);
          const personagensEmbaralhados = embaralhar(personagensOriginais);
          
          let htmlFinal = "";

          nomesEmbaralhados.forEach((nomeJogador, index) => {
            const p = personagensEmbaralhados[index];
            const delayAnimacao = index * 0.1;

            htmlFinal += `
              <div class="card" style="animation-delay: ${delayAnimacao}s">
                <h3 title="${nomeJogador}">${nomeJogador}</h3>
                <img src="${p.img}" alt="${p.nome}">
                <p>${p.nome}</p>
              </div>
            `;
          });

          divResultado.innerHTML = htmlFinal;
          lancarConfete();

        } catch (erro) {
          console.error(erro);
          divResultado.innerHTML = `<div class="mensagem-erro">Erro no sorteio. Tente novamente.</div>`;
        } finally {
          btnSortear.disabled = false;
        }
      }, 800);
    }

    function lancarConfete() {
      const count = 200;
      const defaults = { origin: { y: 0.7 } };
      function fire(particleRatio, opts) {
        confetti(Object.assign({}, defaults, opts, {
          particleCount: Math.floor(count * particleRatio)
        }));
      }
      fire(0.25, { spread: 26, startVelocity: 55 });
      fire(0.2, { spread: 60 });
      fire(0.35, { spread: 100, decay: 0.91, scalar: 0.8 });
      fire(0.1, { spread: 120, startVelocity: 25, decay: 0.92, scalar: 1.2 });
      fire(0.1, { spread: 120, startVelocity: 45 });
    }

    // ===== EVENT LISTENERS (CORREÇÃO DO ENTER) =====
    
    // 1. Ouvinte Global para o ENTER
    document.addEventListener("keydown", (e) => {
      // Verifica se a tecla é ENTER e se o botão não está desabilitado
      if (e.key === "Enter" && !btnSortear.disabled) {
        e.preventDefault(); // Impede pular linha no textarea
        realizarSorteio();
      }
    });

    btnSortear.addEventListener("click", realizarSorteio);

  </script>
